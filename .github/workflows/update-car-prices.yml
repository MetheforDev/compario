name: Araç Fiyatları Güncelle

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Fiyat Çek & Güncelle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bağımlılıkları kur
        working-directory: scripts
        run: npm install

      - name: Fiyatları çek ve güncelle
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scrape-car-prices.mjs

      - name: Sonuç özeti
        if: always()
        run: echo "Tamamlandı."
